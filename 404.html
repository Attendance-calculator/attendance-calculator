<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: Page Absent - Attendance Calculator</title>
    <meta name="description" content="The page you are looking for has been marked absent. Head back to the Attendance Calculator to check your compliance statistics.">
    
    <style>
        :root {
            --bg-base: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border-color: #cbd5e1;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger-bg: #fee2e2;
            --danger-text: #991b1b;
            --danger-border: #fca5a5;
            
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s ease-in-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .error-container {
            max-width: 460px;
            width: 100%;
            background-color: var(--bg-card);
            border: 2px solid var(--text-main);
            border-radius: var(--radius);
            box-shadow: 4px 4px 0px 0px var(--text-main);
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .logo-icon {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 64px;
            height: 64px;
            border: 2px solid var(--text-main);
            border-radius: 50%;
            background-color: var(--danger-bg);
            color: var(--danger-text);
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .mock-attendance-card {
            background-color: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 2rem;
            text-align: left;
        }

        .mock-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px dashed var(--border-color);
        }

        .mock-row:last-of-type {
            border-bottom: none;
            padding-bottom: 0;
        }

        .mock-row:first-of-type {
            padding-top: 0;
        }

        .mock-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .mock-val {
            font-size: 0.9rem;
            font-weight: 700;
        }

        .mock-status-pill {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--danger-text);
            background-color: var(--danger-bg);
            border: 1px solid var(--danger-border);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            transition: var(--transition);
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
            border: 2px solid var(--text-main);
            box-shadow: 2px 2px 0px 0px var(--text-main);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0px 0px var(--text-main);
        }

        .btn-primary:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px 0px var(--text-main);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #f1f5f9;
            border-color: var(--text-main);
        }

        /* Footer inside error wrapper */
        .footer-note {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <!-- Error icon (Witty Absent Marker) -->
        <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </div>

        <h1>404: Page Absent</h1>
        <p class="subtitle">Just like that Friday morning lecture, this page doesn't seem to exist.</p>

        <!-- Relatable student-focused statistics display -->
        <div class="mock-attendance-card">
            <div class="mock-row">
                <span class="mock-label">Resource ID</span>
                <span class="mock-val">/unknown-route</span>
            </div>
            <div class="mock-row">
                <span class="mock-label">Conducted Queries</span>
                <span class="mock-val">1</span>
            </div>
            <div class="mock-row">
                <span class="mock-label">Successful Loads</span>
                <span class="mock-val">0</span>
            </div>
            <div class="mock-row">
                <span class="mock-label">Current Status</span>
                <span class="mock-status-pill">At Risk (0%)</span>
            </div>
        </div>

        <!-- Navigation Action Buttons -->
        <div class="btn-stack">
            <a href="index.html" class="btn btn-primary">
                Return to Calculator
            </a>
            <button class="btn btn-secondary" onclick="window.history.back()">
                Go Back to Previous Page
            </button>
        </div>

        <p class="footer-note">Attendance Calculator Portal</p>
    </div>

</body>
</html>
